<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Microplastic Exposure Dynamics Model</title>
<style>
:root {
--primary: #1a365d;
--primary-light: #2b6cb0;
--accent: #3182ce;
--success: #2f855a;
--success-light: #48bb78;
--bg: #f7fafc;
--card-bg: #ffffff;
--text: #2d3748;
--border: #e2e8f0;
}
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
line-height: 1.6;
color: var(--text);
background-color: var(--bg);
margin: 0;
padding: 24px;
}
.wrapper {
max-width: 900px;
margin: 0 auto;
background: var(--card-bg);
padding: 35px;
border-radius: 12px;
box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
}
header {
border-bottom: 3px solid var(--border);
padding-bottom: 15px;
margin-bottom: 25px;
}
h1 {
color: var(--primary);
margin: 0 0 8px 0;
font-size: 1.8rem;
}
.subtitle {
color: #4a5568;
margin: 0;
font-size: 0.95rem;
}
.layout-grid {
display: grid;
grid-template-columns: 1.1fr 1fr;
gap: 35px;
}
@media (max-width: 850px) {
.layout-grid { grid-template-columns: 1fr; }
}
.panel-title {
font-size: 1.15rem;
color: var(--primary-light);
margin: 25px 0 15px 0;
border-left: 4px solid var(--accent);
padding-left: 10px;
text-transform: uppercase;
letter-spacing: 0.5px;
font-weight: 700;
}
.panel-title:first-of-type { margin-top: 0; }

.panel-title.intervention {
color: var(--success);
border-left-color: var(--success-light);
}

.control-block {
margin-bottom: 20px;
background: #f8fafc;
padding: 12px 16px;
border-radius: 8px;
border: 1px solid var(--border);
}
label {
display: block;
font-weight: 600;
margin-bottom: 6px;
font-size: 0.9rem;
}
.slider-row {
display: flex;
align-items: center;
gap: 15px;
}
input[type="range"] {
flex-grow: 1;
accent-color: var(--accent);
cursor: pointer;
}
.numeric-box {
font-family: "SFMono-Regular", Consolas, "Liberation Mono", Courier, monospace;
font-size: 0.95rem;
font-weight: bold;
background: #edf2f7;
padding: 4px 10px;
border-radius: 4px;
min-width: 75px;
text-align: right;
color: var(--primary);
}

/* Intervention Strategy Buttons */
.btn-group {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
background: #f0fff4;
padding: 15px;
border-radius: 8px;
border: 1px solid #c6f6d5;
}
.btn-group button {
padding: 10px;
font-weight: 600;
font-size: 0.85rem;
border: 1px solid #b2f5ea;
border-radius: 6px;
background: #ffffff;
cursor: pointer;
transition: all 0.2s ease;
color: #2c5282;
}
.btn-group button:hover {
background: #ebf8ff;
border-color: #bee3f8;
}
